<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="RepairWale - Your trusted on-demand mechanic and vehicle repair service platform. Find nearby mechanics, track repairs in real-time, and get your vehicle fixed quickly." />
    <meta name="keywords" content="mechanic, vehicle repair, car service, bike repair, roadside assistance, emergency repair" />
    <meta name="author" content="RepairWale Team" />
    <meta name="theme-color" content="#3b82f6" />
    
    <!-- Open Graph / Social Media -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="RepairWale - On-Demand Mechanic Services" />
    <meta property="og:description" content="Connect with trusted mechanics and get your vehicle repaired quickly" />
    
    <title>RepairWale - On-Demand Mechanic & Vehicle Repair Services</title>
    
    <!-- Leaflet CSS for Maps -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='0.9em' font-size='90'>🔧</text></svg>" />
  </head>
  <body>
    <div id="root"></div>
    <script>
      (function () {
        const liveServerPorts = new Set(['5500', '5501', '5502', '5503'])
        const isLocalHost = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
        const isLiveServer = isLocalHost && liveServerPorts.has(window.location.port)
        const isDistPage = /\/dist(\/|$)/.test(window.location.pathname)

        if (isLiveServer && !isDistPage) {
          const target = new URL('./dist/index.html', window.location.href)
          window.location.replace(target.href)
        }
      })()
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
